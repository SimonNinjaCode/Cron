{% extends "base.html" %}
{% block title %}{{ title }} — Delphi{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted); margin-bottom:24px;">
  <a href="javascript:history.back()"
     style="color:var(--text-muted); text-decoration:none;"
     onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-muted)'">
    &larr; Back
  </a>
  <span>/</span>
  <span style="color:var(--text-secondary); font-family:'JetBrains Mono',monospace; font-size:12px;">{{ path }}</span>
</div>

<div class="card" style="padding:40px 48px;">
  <div class="md-prose">
    {{ html | safe }}
  </div>
</div>
{% endblock %}
